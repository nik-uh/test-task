<app-create-todo-form (createTodo)="onCreateTodo($event)"></app-create-todo-form>
<div class="content-container_todos">
  <div *ngFor="let todo of todos$ | async">
    <app-todo-card 
      [todo]="todo"
      (deleteTodo)="onDeleteTodo($event)"
      (editTodo)="onEditTodo($event)"
      class="texttodo">
    </app-todo-card>
  </div>
</div>
