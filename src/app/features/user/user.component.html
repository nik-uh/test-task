<h2>Список пользователей</h2>

<div class="filters">
  <mat-form-field appearance="outline">
    <mat-label>Поиск по имени</mat-label>
    <input matInput [(ngModel)]="searchTerm" placeholder="Введите имя" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Фильтр</mat-label>
    <mat-select [(ngModel)]="filter">
      <mat-option value="all">Все</mat-option>
      <mat-option value="active">Только активные</mat-option>
      <mat-option value="inactive">Только неактивные</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<table mat-table [dataSource]="filteredUsers()" class="mat-elevation-z8">
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let user"> {{user.id}} </td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Имя </th>
    <td mat-cell *matCellDef="let user"> {{user.name}} </td>
  </ng-container>

  <ng-container matColumnDef="email">
    <th mat-header-cell *matHeaderCellDef> Email </th>
    <td mat-cell *matCellDef="let user"> {{user.email}} </td>
  </ng-container>

  <ng-container matColumnDef="active">
    <th mat-header-cell *matHeaderCellDef> Активен </th>
    <td mat-cell *matCellDef="let user">
      <mat-checkbox [checked]="user.active" disabled></mat-checkbox>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

<h3>➕ Добавить пользователя</h3>
<form (ngSubmit)="addUser()" class="form">
  <mat-form-field appearance="outline">
    <mat-label>Имя</mat-label>
    <input matInput [(ngModel)]="newUser.name" name="name" required />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>
    <input matInput [(ngModel)]="newUser.email" name="email" required />
  </mat-form-field>

  <mat-checkbox [(ngModel)]="newUser.active" name="active">Активен</mat-checkbox>

  <button mat-raised-button color="primary" type="submit">Добавить</button>
</form>
